name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate the strategy library (every strategy sourced + schema-valid)
        run: node tools/check-strategies.mjs
      - name: Unit/property/BDD tests for the core libs
        run: node --test
      - name: Validate plugin manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); console.log('plugin.json OK')"
